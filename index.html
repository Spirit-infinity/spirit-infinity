<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIRIT INFINITY | Global Ledger</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff6600; --cyan: #00f2ff; --dark: #050505; --panel: #111111; --text: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav.spirit-side { width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 25px; }
        .logo-box { color: var(--orange); font-weight: 900; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; }
        .nav-links li { padding: 15px; margin: 8px 0; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; transition: 0.3s; border: 1px solid transparent; }
        .nav-links li:hover, .nav-links li.active { color: #fff; background: rgba(255,102,0,0.1); border-color: var(--orange); border-radius: 4px; }

        /* VIEWPORT */
        main.viewport { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* SCAN IA UI */
        .scan-card { background: var(--panel); border: 1px solid #222; padding: 30px; border-radius: 12px; }
        .ia-scanner-box { width: 100%; height: 200px; background: #000; border: 1px solid var(--cyan); position: relative; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); top: 0; animation: scanning 2s infinite linear; }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

        /* GRID PHOTOS */
        .photo-grid-7 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .mini-upload { background: #000; border: 1px dashed #444; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; text-align: center; }

        /* FORMULAIRE */
        .spirit-input { background: #080808; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; margin-bottom: 15px; border-radius: 4px; }
        .switches-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .sw-box { background: #000; padding: 10px; border: 1px solid #222; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 8px; }

        /* MARKETPLACE */
        .grid-master { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card-spirit { background: var(--panel); border: 1px solid #222; padding: 20px; border-radius: 8px; border-left: 4px solid var(--orange); cursor: pointer; transition: 0.3s; }
        .card-spirit:hover { transform: translateY(-5px); border-color: var(--orange); }
        .price-tag { color: var(--orange); font-size: 1.4rem; font-weight: bold; margin: 10px 0; }

        .btn-spirit { background: var(--orange); color: #000; border: none; padding: 15px; width: 100%; font-weight: 800; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="spirit-side">
        <div class="logo-box">SPIRIT INFINITY</div>
        <ul class="nav-links">
            <li class="active" onclick="showTab('market')"><i class='bx bx-store'></i> MARKETPLACE</li>
            <li onclick="showTab('scan')"><i class='bx bx-scan'></i> VENDRE & CERTIFIER</li>
            <li onclick="showTab('account')"><i class='bx bx-user-circle'></i> MON COMPTE</li>
        </ul>
    </nav>

    <main class="viewport">
        <section id="page-market" class="page active">
            <h1>🛒 Marketplace Ledger</h1>
            <div class="grid-master" id="market-list"></div>
        </section>

        <section id="page-scan" class="page">
            <div class="scan-card">
                <div class="ia-scanner-box">
                    <div class="scan-line"></div>
                    <span style="color: var(--cyan); letter-spacing: 3px; font-size: 12px;">SCANNER SPIRIT EYES ACTIF</span>
                </div>

                <div class="photo-grid-7">
                    <div class="mini-upload" onclick="document.getElementById('f1').click()"><div id="p1">TÊTE FACE</div><input type="file" id="f1" hidden onchange="previewImage(this, 'p1')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f2').click()"><div id="p2">TÊTE PROFIL</div><input type="file" id="f2" hidden onchange="previewImage(this, 'p2')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f3').click()"><div id="p3">CORPS FACE</div><input type="file" id="f3" hidden onchange="previewImage(this, 'p3')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f4').click()"><div id="p4">CORPS DOS</div><input type="file" id="f4" hidden onchange="previewImage(this, 'p4')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f5').click()"><div id="p5">ACCESSOIRES</div><input type="file" id="f5" hidden onchange="previewImage(this, 'p5')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f6').click()"><div id="p6">BOITE</div><input type="file" id="f6" hidden onchange="previewImage(this, 'p6')"></div>
                    <div class="mini-upload" onclick="document.getElementById('f7').click()"><div id="p7">SURCARTON</div><input type="file" id="f7" hidden onchange="previewImage(this, 'p7')"></div>
                </div>

                <input type="text" id="item-title" placeholder="NOM DE LA FIGURINE" class="spirit-input">
                <input type="text" id="item-brand" placeholder="MARQUE (Ex: Hot Toys, Tsume...)" class="spirit-input">
                
                <select id="item-carrier" class="spirit-input">
                    <option value="">CHOIX DU TRANSPORTEUR</option>
                    <option value="Mondial Relay">Mondial Relay (Sécurisé)</option>
                    <option value="Colissimo">Colissimo (Expert)</option>
                    <option value="Chronopost">Chronopost (Rapide)</option>
                </select>

                <div class="switches-container">
                    <div class="sw-box"><input type="checkbox" id="check-smoke"> 🚭 Non-fumeur</div>
                    <div class="sw-box"><input type="checkbox" id="check-light"> ☀️ Anti-UV</div>
                    <div class="sw-box"><input type="checkbox" id="check-hand"> 💎 1ère Main</div>
                </div>

                <input type="number" id="item-price" placeholder="PRIX (€)" class="spirit-input">
                <button class="btn-spirit" onclick="SpiritEngine.processSale()">CERTIFIER & PUBLIER</button>
            </div>
        </section>

        <section id="page-account" class="page">
            <h1>🏠 Mon Espace Spirit</h1>
            <div style="margin-top:20px;">
                <h3>Mes Acquisitions</h3>
                <div id="my-purchases" class="grid-master"></div>
                <h3 style="margin-top:30px;">Mes Annonces en ligne</h3>
                <div id="my-listings" class="grid-master"></div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://eagmxrbtcajqlhivvpww.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhZ214cmJ0Y2FqcWxoaXZ2cHd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDYzMTAsImV4cCI6MjA4Njg4MjMxMH0.bkruo7GrA7UUZIv7HANG4_DFUrm9IygJP9ueVk_4r78');

        function showTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if(id === 'account') SpiritEngine.loadUserAccount();
        }

        function previewImage(input, id) {
            const preview = document.getElementById(id);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        const SpiritEngine = {
            userId: "USER_PRO_2026",

            async init() {
                await this.loadMarketplace();
            },

            async loadMarketplace() {
                const { data } = await _supabase.from('transactions').select('*').neq('status', 'VENDU');
                const grid = document.getElementById('market-list');
                grid.innerHTML = data.map(item => `
                    <div class="card-spirit" onclick="SpiritEngine.buyItem('${item.id}')">
                        <small style="color:var(--cyan)">MARQUE: ${item.brand || 'N/A'}</small>
                        <h3>${item.figurine_name}</h3>
                        <p class="price-tag">${item.amount} €</p>
                        <p style="font-size:10px;">📦 ${item.carrier || 'Standard'}</p>
                        <button class="btn-spirit" style="margin-top:10px; padding:5px;">VOIR / ACHETER</button>
                    </div>
                `).join('');
            },

            async processSale() {
                const name = document.getElementById('item-title').value;
                const brand = document.getElementById('item-brand').value;
                const price = document.getElementById('item-price').value;
                const carrier = document.getElementById('item-carrier').value;

                if(!name || !price) return alert("Nom et prix requis !");

                await _supabase.from('transactions').insert([{
                    figurine_name: name,
                    brand: brand,
                    amount: price,
                    carrier: carrier,
                    seller_id: this.userId,
                    status: 'EN LIGNE'
                }]);

                alert("Scellé sur le Ledger !");
                showTab('market');
                this.loadMarketplace();
            },

            async buyItem(id) {
                if(confirm("Confirmer l'achat ? (Protection 8% incluse)")) {
                    await _supabase.from('transactions').update({ status: 'VENDU', buyer_id: this.userId }).eq('id', id);
                    alert("Acquisition réussie ! Retrouvez-la dans votre compte.");
                    this.loadMarketplace();
                }
            },

            async loadUserAccount() {
                const { data: listings } = await _supabase.from('transactions').select('*').eq('seller_id', this.userId);
                const { data: purchases } = await _supabase.from('transactions').select('*').eq('buyer_id', this.userId);
                
                document.getElementById('my-listings').innerHTML = listings.map(l => `<div class="card-spirit"><h3>${l.figurine_name}</h3><p>${l.status}</p></div>`).join('');
                document.getElementById('my-purchases').innerHTML = purchases.map(p => `<div class="card-spirit"><h3>${p.figurine_name}</h3><p>📦 En route</p></div>`).join('');
            }
        };

        window.onload = () => SpiritEngine.init();
    </script>
</body>
</html>
